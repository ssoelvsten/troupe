name: Build project and run tests
on: [pull_request, push]
jobs:
  build_and_test:
    runs-on: ubuntu-22.04
    if: github.repository_owner == 'TroupeLang' 
    env:
        STACK_OPTS: "--system-ghc"
        TROUPE: ${{github.workspace}}
        TERM: "xterm-color"
    steps:
      - uses: actions/checkout@v4
      
      # Cache apt packages
      - name: Cache apt packages
        uses: actions/cache@v3
        id: apt-cache
        with:
          path: ~/apt-cache
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/run_tests.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-
      
      - name: Install apt packages
        run: |
          if [ "${{ steps.apt-cache.outputs.cache-hit }}" != "true" ]; then
            sudo apt-get update
            sudo apt-get install -y libnuma-dev diffutils
            mkdir -p ~/apt-cache
            for pkg in libnuma-dev diffutils; do
              apt-get download $(apt-cache depends --recurse --no-recommends --no-suggests --no-conflicts --no-breaks --no-replaces --no-enhances $pkg | grep "^\w" | sort -u)
            done
            mv *.deb ~/apt-cache/
          else
            sudo dpkg -i ~/apt-cache/*.deb
          fi
      
      # Cache Stack dependencies
      - name: Cache Stack
        uses: actions/cache@v3
        with:
          path: |
            ~/.stack
            compiler/.stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('compiler/stack.yaml', 'compiler/package.yaml', 'compiler/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-stack-
      
      # Cache npm dependencies
      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
            rt/node_modules
            p2p-tools/node_modules
            p2p-tools/relay/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      
      # Cache global npm packages (TypeScript)
      - name: Cache global npm packages
        uses: actions/cache@v3
        with:
          path: ~/.npm-global
          key: ${{ runner.os }}-npm-global-typescript
      
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.4.8' # Exact version of ghc to use
          # cabal-version: 'latest'. Omitted, but defaults to 'latest'
          enable-stack: true
          # stack-version: 'latest'
      
      - uses: actions/setup-node@v4
        with:
          cache: 'npm'
      
      # Set up global npm directory
      - name: Setup npm global directory
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix '~/.npm-global'
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH
      
      # Cache compiled artifacts
      - name: Cache build artifacts
        uses: actions/cache@v3
        with:
          path: |
            bin/troupec
            rt/built
            p2p-tools/built
            lib/*.js
            trp-rt/*.js
          key: ${{ runner.os }}-build-${{ hashFiles('compiler/**/*.hs', 'rt/src/**/*.mts', 'p2p-tools/**/*.ts', 'lib/**/*.trp', 'trp-rt/**/*.trp') }}
          restore-keys: |
            ${{ runner.os }}-build-
      
      - name: compile the compiler
        run: make compiler
      
      - run: make npm
      - name: make p2p-tools 
        run: make p2p-tools
      - name: compile the runtime
        run: make rt
      - name: compile libs
        run: make libs
      - name: compile service
        run: make service      
      # - name: golden tests
      #   run: make ci-test-golden-no-color
